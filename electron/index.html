<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>spotwire</title>
  <link rel="stylesheet" href="./renderer/styles/output.css">
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center">
  <div class="text-center">
    <h1 class="text-4xl font-bold mb-10">spotwire</h1>
    <button
      id="spotify-login-btn"
      class="px-6 py-3 bg-green-500 rounded-lg text-lg font-medium hover:bg-green-600 transition duration-200"
    >
      Log in with Spotify
    </button>
  </div>
  <script>
    const loginButton = document.getElementById('spotify-login-btn');
    loginButton.addEventListener('click', async () => {
      const response = await window.electron.spotifyLogin();
      if (response.success) {
        alert('Spotify login initiated. Please log in via your browser.');
      }
    });
  </script>
</body>
</html>
